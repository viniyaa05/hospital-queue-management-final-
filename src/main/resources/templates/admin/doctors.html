<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Manage Doctors</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-wrapper">
<div th:replace="~{fragments :: navbar}"></div>
<div class="layout">
    <div th:replace="~{fragments :: admin-sidebar}"></div>
    <div class="main-content">
        <div class="page-title">👨‍⚕️ Manage Doctors</div>
        <div th:replace="~{fragments :: flash}"></div>

        <!-- Add Doctor Form -->
        <div class="card">
            <div class="card-header">➕ Add New Doctor</div>
            <div class="card-body">
                <form th:action="@{/admin/doctors/add}" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Full Name *</label>
                            <input type="text" class="form-control" name="name" required placeholder="Dr. Full Name">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Specialization *</label>
                            <input type="text" class="form-control" name="specialization" required placeholder="e.g. Cardiologist">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Email *</label>
                            <input type="email" class="form-control" name="email" required placeholder="doctor@hospital.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" name="phone" placeholder="10-digit phone">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Username *</label>
                            <input type="text" class="form-control" name="username" required placeholder="Login username">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password *</label>
                            <input type="password" class="form-control" name="password" required placeholder="Set login password">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Department *</label>
                        <select class="form-control" name="departmentId" required>
                            <option value="">-- Select Department --</option>
                            <option th:each="dept : ${departments}"
                                    th:value="${dept.id}"
                                    th:text="${dept.name}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">➕ Add Doctor</button>
                </form>
            </div>
        </div>

        <!-- Doctors Table -->
        <div class="card">
            <div class="card-header">All Doctors (<span th:text="${doctors.size()}"></span>)</div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>Specialization</th><th>Department</th><th>Username</th><th>Email</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="doc : ${doctors}">
                            <td th:text="${doc.id}"></td>
                            <td><strong th:text="${doc.name}"></strong></td>
                            <td th:text="${doc.specialization}"></td>
                            <td th:text="${doc.department?.name ?: '—'}"></td>
                            <td><code th:text="${doc.username}"></code></td>
                            <td th:text="${doc.email}"></td>
                            <td>
                                <span class="badge badge-completed" th:if="${doc.active}">Active</span>
                                <span class="badge badge-skipped"  th:if="${!doc.active}">Inactive</span>
                            </td>
                            <td>
                                <form th:action="@{/admin/doctors/deactivate/{id}(id=${doc.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            th:if="${doc.active}"
                                            onclick="return confirm('Deactivate this doctor?')">Deactivate</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
