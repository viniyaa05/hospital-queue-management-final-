<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- NO JAVASCRIPT — page auto-refreshes via HTML meta tag -->
    <meta http-equiv="refresh" th:content="${refreshSeconds}">
    <title>Live Queue Board – Hospital</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #0d1b2a; color: #fff; }
        .board-header {
            background: linear-gradient(90deg,#1a6eb5,#134f85);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .board-title { font-size: 1.5rem; font-weight: 800; }
        .board-time  { font-size: 0.9rem; opacity: 0.8; }
        .board-grid  { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 1rem; padding: 1.5rem; }
        .dept-tile   { background: #1a2940; border-radius: 10px; overflow: hidden; border: 1px solid #2a3f60; }
        .dept-name   { background: #1a6eb5; padding: 0.7rem 1rem; font-weight: 700; font-size: 0.95rem; }
        .dept-body   { padding: 1rem; }
        .now-serving-label { font-size:0.72rem; text-transform:uppercase; letter-spacing:.08em; color:#90a4c8; margin-bottom:0.2rem; }
        .now-token   { font-size: 3rem; font-weight: 900; color: #4ade80; line-height:1; }
        .now-name    { font-size: 0.88rem; color: #cdd6f4; margin-top: 0.2rem; }
        .next-label  { font-size:0.72rem; text-transform:uppercase; letter-spacing:.08em; color:#90a4c8; margin: 0.8rem 0 0.3rem; }
        .next-list   { list-style:none; }
        .next-list li { padding:0.28rem 0; border-bottom:1px solid #2a3f60; font-size:0.87rem; display:flex; justify-content:space-between; color:#cdd6f4; }
        .next-list li:last-child { border:none; }
        .empty-token { color: #4a5e80; font-style: italic; font-size:0.9rem; }
        .ticker      { background:#1a6eb5; color:#fff; padding:0.4rem 1.5rem; font-size:0.83rem; display:flex; align-items:center; gap:0.5rem; }
        .ticker-dot  { width:8px; height:8px; background:#4ade80; border-radius:50%; display:inline-block; }
        .counter-pill {
            display:inline-block; padding:0.1rem 0.5rem; border-radius:10px;
            font-size:0.7rem; font-weight:600;
            background:#2a3f60; color:#90c2ff;
        }
    </style>
</head>
<body>

<div class="board-header">
    <div class="board-title">🏥 Hospital Live Queue Board</div>
    <div class="board-time">
        Auto-refreshes every <span th:text="${refreshSeconds}"></span> seconds &nbsp;|&nbsp;
        <span th:text="${#temporals.format(#temporals.createNow(), 'dd MMM yyyy, hh:mm a')}"></span>
    </div>
</div>

<div class="ticker">
    <span class="ticker-dot"></span>
    Live queue display — Priority order: 🚨 Emergency → ⭐ High Priority → Normal
    &nbsp;|&nbsp; Counters: Consultation · Billing · Lab · Pharmacy
</div>

<div class="board-grid">
    <div th:each="dept : ${departments}" class="dept-tile">
        <div class="dept-name" th:text="${dept.name}">Department</div>
        <div class="dept-body">
            <!-- We show links to department-specific view -->
            <div class="now-serving-label">Now Serving</div>
            <div>
                <a th:href="@{/queue/department/{id}(id=${dept.id})}"
                   style="color:inherit; text-decoration:none;">
                    <div class="now-token">–</div>
                    <div class="now-name">Click to view full queue →</div>
                </a>
            </div>
            <div class="next-label">Location</div>
            <div style="font-size:0.85rem; color:#90a4c8;" th:text="${dept.location ?: '—'}">–</div>
        </div>
    </div>
</div>

<div style="text-align:center; padding:1rem; color:#4a5e80; font-size:0.8rem;">
    Page auto-refreshes every <span th:text="${refreshSeconds}"></span> seconds &nbsp;·&nbsp;
    <a th:href="@{/}" style="color:#4a90d9;">Home</a>
</div>

</body>
</html>
