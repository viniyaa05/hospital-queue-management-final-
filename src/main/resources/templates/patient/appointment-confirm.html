<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Appointment Confirmed</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-wrapper">
<div th:replace="~{fragments :: navbar}"></div>
<div class="main-content" style="max-width:520px; margin:0 auto; text-align:center; padding-top:3rem;">
    <div class="card">
        <div class="card-body">
            <div style="font-size:3.5rem; margin-bottom:0.75rem;">✅</div>
            <h2 style="color:var(--success); margin-bottom:0.5rem;">Appointment Confirmed!</h2>
            <p class="text-muted mb-2">Your appointment has been successfully booked.</p>

            <div style="background:var(--light); border-radius:var(--radius); padding:1rem; text-align:left; margin:1rem 0;">
                <div class="token-info-row">
                    <span>Patient</span>
                    <span th:text="${appointment.patient.name}">–</span>
                </div>
                <div class="token-info-row">
                    <span>Department</span>
                    <span th:text="${appointment.department.name}">–</span>
                </div>
                <div class="token-info-row">
                    <span>Date</span>
                    <span th:text="${appointment.appointmentDate}">–</span>
                </div>
                <div class="token-info-row">
                    <span>Time</span>
                    <span th:text="${appointment.appointmentTime}">–</span>
                </div>
                <div class="token-info-row" th:if="${appointment.reason}">
                    <span>Reason</span>
                    <span th:text="${appointment.reason}">–</span>
                </div>
                <div class="token-info-row">
                    <span>Appointment ID</span>
                    <span th:text="'#' + ${appointment.id}" style="font-weight:700; color:var(--primary);">–</span>
                </div>
            </div>

            <div style="background:#e8f5e9; border-radius:var(--radius); padding:0.75rem; font-size:0.85rem; color:#2e7d32;">
                📢 On the appointment day, please visit the <strong th:text="${appointment.department.name}"></strong> counter.
                The doctor will convert your appointment into a live queue token.
            </div>

            <div style="display:flex; gap:0.75rem; justify-content:center; margin-top:1.2rem;">
                <a th:href="@{/patient/register}" class="btn btn-primary">➕ New Patient</a>
                <a th:href="@{/}" class="btn btn-light">🏠 Home</a>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
