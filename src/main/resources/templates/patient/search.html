<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Search Patient</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-wrapper">
<div th:replace="~{fragments :: navbar}"></div>
<div class="main-content" style="max-width:720px; margin:0 auto;">
    <div class="page-title">🔍 Search Patient</div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/patient/search}" method="get">
                <div style="display:flex; gap:0.75rem; align-items:flex-end;">
                    <div class="form-group" style="flex:1; margin:0;">
                        <label class="form-label">Search by Phone Number</label>
                        <input type="tel" class="form-control" name="phone"
                               th:value="${phone}" placeholder="Enter 10-digit phone number">
                    </div>
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${patients != null}">
        <div th:if="${patients.empty}" class="empty-state card">
            <div class="card-body">
                <div class="empty-icon">😕</div>
                <p>No patients found for phone: <strong th:text="${phone}"></strong></p>
            </div>
        </div>

        <div th:if="${!patients.empty}" class="card">
            <div class="card-header" th:text="'Found ' + ${patients.size()} + ' patient(s)'"></div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th><th>Name</th><th>Age</th><th>Gender</th><th>Phone</th><th>Priority</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${patients}">
                            <td th:text="${p.id}"></td>
                            <td th:text="${p.name}"></td>
                            <td th:text="${p.age}"></td>
                            <td th:text="${p.gender}"></td>
                            <td th:text="${p.phone}"></td>
                            <td>
                                <span class="badge badge-emergency" th:if="${p.priority.name() == 'EMERGENCY'}">EMERGENCY</span>
                                <span class="badge badge-high"      th:if="${p.priority.name() == 'HIGH'}">HIGH</span>
                                <span class="badge badge-normal"    th:if="${p.priority.name() == 'NORMAL'}">NORMAL</span>
                            </td>
                            <td>
                                <a th:href="@{/patient/appointment(patientId=${p.id})}" class="btn btn-sm btn-primary">Book Appt</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
