<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment – Hospital Queue System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-wrapper">
<div th:replace="~{fragments :: navbar}"></div>
<div class="main-content" style="max-width:680px; margin:0 auto;">
    <div class="page-title">
        📅 Book Appointment
        <div class="page-subtitle">Schedule a future appointment — it will auto-merge into the live queue on the day</div>
    </div>

    <div th:replace="~{fragments :: flash}"></div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/patient/appointment}" method="post">

                <div class="form-group">
                    <label class="form-label">Patient ID *</label>
                    <input type="number" class="form-control" name="patientId"
                           placeholder="Enter existing patient ID" required>
                    <div class="form-hint">
                        Don't know patient ID? <a th:href="@{/patient/search}">Search by phone →</a>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Department *</label>
                    <select class="form-control" name="departmentId" required>
                        <option value="">-- Select Department --</option>
                        <option th:each="dept : ${departments}"
                                th:value="${dept.id}"
                                th:text="${dept.name}"></option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Appointment Date *</label>
                        <input type="date" class="form-control" name="appointmentDate"
                               th:min="${minDate}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Preferred Time *</label>
                        <input type="time" class="form-control" name="appointmentTime"
                               min="08:00" max="20:00" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Reason for Visit</label>
                    <input type="text" class="form-control" name="reason"
                           placeholder="Brief reason (optional)">
                </div>

                <div style="display:flex; gap:1rem; margin-top:1rem;">
                    <button type="submit" class="btn btn-primary btn-lg">📅 Book Appointment</button>
                    <a th:href="@{/}" class="btn btn-light btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
